<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puru | Product Designer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="bento-grid">
        <div class="box intro-box">
            <h1>Hi, I'm Puru</h1>
            <p>This website is nothing but a collection of things that keep me sane every day: the music I groove to, the WhatsApp stickers that make me giggle (and hopefully make you giggle, too), and the food I'm always thinking about.</p>
            <a href="stickers.html" class="cta-button">CLICK HERE</a>
        </div>

        <div class="box photo-box">
            <img src="images/puru.avif" alt="Illustration of Puru waving hi">
        </div>

        <div class="box spotify-box">
            <iframe 
                data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/6AHFJyYhP53W6cnRHrDD6V?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"
                title="Spotify Music Player featuring my favorite album">
            </iframe>
        </div>

        <div class="box featured-box">
            <h2>Food First Human</h2>
            <img src="images/food.png" alt="Collage of my favorite meals: burgers, pasta, and bowls">
        </div>

        <footer class="box social-box">
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
            <a href="https://instagram.com" target="_blank">Instagram</a>
            <a href="mailto:puru@umich.edu">Mail</a>
        </footer>
    </main>
</body>
</html>
